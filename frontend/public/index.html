<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BloodLink — AI Donor Matching</title>

    <!-- Tailwind CSS via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              /* Optimus light theme — warm off-white */
              background:  '#f9f7f4',
              foreground:  '#111111',
              card:        '#ffffff',
              border:      '#e5e2dd',
              muted:       '#f0ede8',
              'muted-fg':  '#888480',
              input:       '#f0ede8',
              /* BloodLink brand accents */
              blood:  '#C41E3A',
              teal:   '#0A7E8C',
              safe:   '#059669',
              warn:   '#D97706',
              danger: '#DC2626',
            },
            fontFamily: {
              sans:    ['Instrument Sans', 'system-ui', 'sans-serif'],
              mono:    ['JetBrains Mono', 'ui-monospace', 'monospace'],
              display: ['Instrument Serif', 'Georgia', 'serif'],
            },
            borderRadius: {
              DEFAULT: '0.25rem',
              sm: '0.125rem',
              md: '0.25rem',
              lg: '0.375rem',
              xl: '0.5rem',
              full: '9999px',
            },
          },
        },
      }
    </script>

    <!-- Google Fonts — matching Optimus exactly -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=Instrument+Serif&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
  </head>
  <body class="bg-background text-foreground antialiased">
    <div id="root"></div>
  </body>
</html>
